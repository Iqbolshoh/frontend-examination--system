<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Examination System</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- CSS faylni ulash -->
    <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
    <div class="exam-container" id="examApp">
        <!-- Sarlavha -->
        <div class="exam-header">
            <h1><i class="fas fa-graduation-cap"></i> Online Exam</h1>
            <div class="exam-timer">
                <i class="fas fa-hourglass-half"></i>
                <span id="timerDisplay">15:00</span>
            </div>
        </div>

        <!-- Progress va meta -->
        <div class="exam-meta">
            <span class="question-counter">
                <i class="fas fa-question-circle"></i>
                <span id="currentQNum">1</span>/<span id="totalQNum">5</span>
            </span>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <span class="score-badge">
                <i class="fas fa-star"></i> <span id="scoreDisplay">0</span>
            </span>
        </div>

        <!-- Savol kartasi -->
        <div class="question-card" id="questionCard">
            <div class="question-text" id="questionText">Savol yuklanmoqda...</div>
            <div class="options-list" id="optionsContainer"></div>
        </div>

        <!-- Navigatsiya -->
        <div class="nav-controls">
            <div class="btn-group">
                <button class="btn btn-outline" id="prevBtn">
                    <i class="fas fa-chevron-left"></i> Oldingi
                </button>
                <button class="btn btn-outline" id="nextBtn">
                    Keyingi <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div>
                <button class="btn btn-success" id="submitBtn">
                    <i class="fas fa-check-circle"></i> Imtihonni topshirish
                </button>
            </div>
        </div>

        <!-- Natija paneli -->
        <div class="result-panel" id="resultPanel">
            <h2><i class="fas fa-flag-checked"></i> Imtihon tugadi</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="result-message" id="resultMessage">Ajoyib!</div>
            <button class="btn btn-primary" id="restartBtn">
                <i class="fas fa-sync-alt"></i> Qayta boshlash
            </button>
        </div>
    </div>

    <!-- JS faylni ulash -->
    <script src="./assets/script.js"></script>
</body>
</html>
